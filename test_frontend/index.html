<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App - Вход</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <h1>Вход</h1>
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="login-password">Пароль:</label>
                <input type="password" id="login-password" placeholder="Пароль">
            </div>
            <button id="login-btn" class="btn-primary">Войти</button>
            <div id="login-message" class="message"></div>
            
            <div class="auth-links">
                <a href="#" id="show-register">Регистрация</a>
            </div>
        </div>

        <div class="auth-form hidden" id="register-form">
            <h1>Регистрация</h1>
            <div class="form-group">
                <label for="reg-username">Имя пользователя:</label>
                <input type="text" id="reg-username" placeholder="Username">
            </div>
            <div class="form-group">
                <label for="reg-email">Email:</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="reg-password">Пароль:</label>
                <input type="password" id="reg-password" placeholder="Пароль">
            </div>
            <div class="form-group">
                <label for="reg-password-confirm">Подтвердите пароль:</label>
                <input type="password" id="reg-password-confirm" placeholder="Пароль">
            </div>
            <button id="register-btn" class="btn-primary">Зарегистрироваться</button>
            <div id="register-message" class="message"></div>
            
            <div class="auth-links">
                <a href="#" id="show-login">Войти</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/http.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
