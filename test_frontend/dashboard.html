<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App - Главная</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">Music App</div>
        <nav class="nav">
            <a href="dashboard.html" class="active">Главная</a>
            <a href="tracks.html">Треки</a>
            <a href="genres.html">Жанры</a>
            <a href="playlists.html">Плейлисты</a>
            <a href="library.html">Медиатека</a>
        </nav>
        <div class="user-menu">
            <span id="username">User</span>
            <button id="logout-btn" class="btn-secondary">Выйти</button>
        </div>
    </header>

    <main class="container">
        <h1>Добро пожаловать</h1>
        <div class="stats">
            <div class="stat-card">
                <h3>Последние треки</h3>
                <div id="recent-tracks"></div>
            </div>
            <div class="stat-card">
                <h3>Ваши плейлисты</h3>
                <div id="user-playlists"></div>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/http.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tracks.js"></script>
    <script src="js/playlists.js"></script>
</body>
</html>
